name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OPERATOR_PRIVATE_KEY: "0xababababababababababababababababababababababababababababababababab"
      EVALUATOR_PRIVATE_KEY: "0xcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcd"
      VENICE_API_KEY: "test-key"
      SKIP_NETWORK_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python3 -m pytest tests/ -v --tb=short -k "not integration"
