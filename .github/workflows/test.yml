name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OPERATOR_PRIVATE_KEY: "0xababababababababababababababababababababababababababababababababab"
      EVALUATOR_PRIVATE_KEY: "0xcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcd"
      VENICE_API_KEY: "test-key"
      SKIP_NETWORK_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy --ignore-missing-imports *.py
      - name: Tests with coverage
        run: python3 -m pytest tests/ -v --tb=short -k "not integration" --cov=. --cov-report=term-missing --cov-config=pyproject.toml
