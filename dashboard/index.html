<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel — Agent Trust Oracle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .radar-label { font: 12px sans-serif; fill: #6b7280; }
        .radar-grid { stroke: #e5e7eb; stroke-width: 1; fill: none; }
        .radar-axis { stroke: #d1d5db; stroke-width: 1; }
        .radar-fill { fill: rgba(99, 102, 241, 0.2); stroke: #6366f1; stroke-width: 2; }
        .radar-point { fill: #6366f1; }
        .score-high { color: #10b981; }
        .score-mid { color: #f59e0b; }
        .score-low { color: #ef4444; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Sentinel — Agent Trust Oracle</h1>
                    <p class="text-gray-500 mt-1">Autonomous agent trust verification with on-chain reputation</p>
                </div>
                <div class="text-right text-sm text-gray-500">
                    <div>ERC-8004 on Base</div>
                    <div id="agent-id" class="font-mono"></div>
                </div>
            </div>
            <div class="mt-4 grid grid-cols-3 gap-4 text-sm">
                <div class="bg-gray-50 rounded p-3">
                    <div class="text-gray-500">Operator</div>
                    <div id="operator-wallet" class="font-mono text-xs truncate"></div>
                </div>
                <div class="bg-gray-50 rounded p-3">
                    <div class="text-gray-500">Evaluator</div>
                    <div id="evaluator-wallet" class="font-mono text-xs truncate"></div>
                </div>
                <div class="bg-gray-50 rounded p-3">
                    <div class="text-gray-500">Agents Evaluated</div>
                    <div id="total-count" class="text-2xl font-bold text-indigo-600">0</div>
                </div>
            </div>
        </div>

        <!-- Evaluation Cards -->
        <div id="evaluations" class="space-y-6"></div>

        <!-- Empty State -->
        <div id="empty-state" class="bg-white rounded-lg shadow-sm p-12 text-center text-gray-400">
            <p class="text-lg">No evaluations yet</p>
            <p class="mt-2 text-sm">Run: <code class="bg-gray-100 px-2 py-1 rounded">python3 main.py discover --testnet</code></p>
        </div>
    </div>

    <script>
    // SVG Radar Chart Generator
    function createRadarChart(dimensions, size = 200) {
        const labels = ['Identity', 'Liveness', 'On-chain', 'Venice'];
        const values = [
            dimensions.identity_completeness,
            dimensions.endpoint_liveness,
            dimensions.onchain_history,
            dimensions.venice_trust_analysis
        ];
        const cx = size / 2, cy = size / 2;
        const maxR = size / 2 - 30;
        const levels = 4;

        let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;

        // Grid circles
        for (let i = 1; i <= levels; i++) {
            const r = (maxR / levels) * i;
            const points = [];
            for (let j = 0; j < 4; j++) {
                const angle = (Math.PI * 2 * j) / 4 - Math.PI / 2;
                points.push(`${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`);
            }
            svg += `<polygon points="${points.join(' ')}" class="radar-grid"/>`;
        }

        // Axes
        for (let j = 0; j < 4; j++) {
            const angle = (Math.PI * 2 * j) / 4 - Math.PI / 2;
            const x = cx + maxR * Math.cos(angle);
            const y = cy + maxR * Math.sin(angle);
            svg += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" class="radar-axis"/>`;

            // Labels
            const lx = cx + (maxR + 18) * Math.cos(angle);
            const ly = cy + (maxR + 18) * Math.sin(angle);
            const anchor = j === 0 ? 'middle' : j === 2 ? 'middle' : j === 1 ? 'start' : 'end';
            svg += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" class="radar-label">${labels[j]}</text>`;
        }

        // Data polygon
        const dataPoints = [];
        for (let j = 0; j < 4; j++) {
            const angle = (Math.PI * 2 * j) / 4 - Math.PI / 2;
            const r = (values[j] / 100) * maxR;
            const x = cx + r * Math.cos(angle);
            const y = cy + r * Math.sin(angle);
            dataPoints.push(`${x},${y}`);
        }
        svg += `<polygon points="${dataPoints.join(' ')}" class="radar-fill"/>`;

        // Data points
        for (let j = 0; j < 4; j++) {
            const angle = (Math.PI * 2 * j) / 4 - Math.PI / 2;
            const r = (values[j] / 100) * maxR;
            const x = cx + r * Math.cos(angle);
            const y = cy + r * Math.sin(angle);
            svg += `<circle cx="${x}" cy="${y}" r="4" class="radar-point"/>`;
            svg += `<text x="${x}" y="${y - 10}" text-anchor="middle" class="radar-label" style="font-weight:bold;fill:#6366f1">${values[j]}</text>`;
        }

        svg += '</svg>';
        return svg;
    }

    function scoreClass(score) {
        if (score >= 70) return 'score-high';
        if (score >= 40) return 'score-mid';
        return 'score-low';
    }

    function stateLabel(state) {
        const map = {
            'PUBLISHED': ['Published', 'bg-green-100 text-green-800'],
            'VERIFIED': ['Verified', 'bg-blue-100 text-blue-800'],
            'WITHHELD_LOW_CONFIDENCE': ['Withheld', 'bg-yellow-100 text-yellow-800'],
            'PENDING_HUMAN_REVIEW': ['Pending Review', 'bg-orange-100 text-orange-800'],
            'FAILED': ['Failed', 'bg-red-100 text-red-800'],
        };
        const [label, cls] = map[state] || [state, 'bg-gray-100 text-gray-800'];
        return `<span class="px-2 py-1 rounded-full text-xs font-medium ${cls}">${label}</span>`;
    }

    function renderEvaluation(eval) {
        const explorerBase = 'https://basescan.org';
        const txLink = eval.tx_hash
            ? `<a href="${explorerBase}/tx/${eval.tx_hash}" target="_blank" class="text-indigo-600 hover:underline font-mono text-xs">${eval.tx_hash.slice(0, 14)}...</a>`
            : '<span class="text-gray-400 text-xs">N/A</span>';
        const ownerLink = `<a href="${explorerBase}/address/${eval.owner_address}" target="_blank" class="text-indigo-600 hover:underline font-mono text-xs">${eval.owner_address.slice(0, 14)}...</a>`;

        const ep = eval.endpoints || {};

        return `
        <div class="bg-white rounded-lg shadow-sm p-6">
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="text-lg font-semibold text-gray-900">Agent #${eval.agent_id}</h3>
                    <div class="mt-1 text-xs text-gray-500 truncate max-w-md" title="${eval.agent_uri}">${eval.agent_uri}</div>
                    <div class="mt-1">Owner: ${ownerLink}</div>
                    <div class="mt-2">${stateLabel(eval.state)}</div>
                </div>
                <div class="text-right">
                    <div class="text-3xl font-bold ${scoreClass(eval.composite_score)}">${eval.composite_score}</div>
                    <div class="text-sm text-gray-500">Trust Score</div>
                    <div class="mt-1 text-sm">Confidence: <span class="${scoreClass(eval.confidence)} font-semibold">${eval.confidence}%</span></div>
                </div>
            </div>
            <div class="mt-4 flex items-center gap-8">
                <div>${createRadarChart(eval.dimensions, 220)}</div>
                <div class="flex-1">
                    <table class="w-full text-sm">
                        <tr class="border-b"><td class="py-2 text-gray-500">Identity Completeness</td><td class="py-2 text-right font-semibold ${scoreClass(eval.dimensions.identity_completeness)}">${eval.dimensions.identity_completeness}</td></tr>
                        <tr class="border-b"><td class="py-2 text-gray-500">Endpoint Liveness</td><td class="py-2 text-right font-semibold ${scoreClass(eval.dimensions.endpoint_liveness)}">${eval.dimensions.endpoint_liveness}</td></tr>
                        <tr class="border-b"><td class="py-2 text-gray-500">On-chain History</td><td class="py-2 text-right font-semibold ${scoreClass(eval.dimensions.onchain_history)}">${eval.dimensions.onchain_history}</td></tr>
                        <tr class="border-b"><td class="py-2 text-gray-500">Venice Trust Analysis</td><td class="py-2 text-right font-semibold ${scoreClass(eval.dimensions.venice_trust_analysis)}">${eval.dimensions.venice_trust_analysis}</td></tr>
                        <tr><td class="py-2 text-gray-500">Spread</td><td class="py-2 text-right">${eval.spread}</td></tr>
                    </table>
                    <div class="mt-3 space-y-1">
                        <div class="text-xs text-gray-500">
                            Endpoints: <span class="font-medium">${ep.live || 0}/${ep.declared || 0} live</span>,
                            <span class="font-medium">${ep.secured || 0} secured</span>,
                            <span class="font-medium ${(ep.dead || 0) > 0 ? 'text-red-500' : ''}">${ep.dead || 0} dead</span>
                        </div>
                        <div class="text-xs text-gray-400">
                            <div>Source: ${eval.discovery_source} | Tools: ${eval.tool_calls_used}</div>
                            <div>TX: ${txLink}</div>
                            <div>${eval.timestamp}</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
    }

    // Load data
    async function loadData() {
        try {
            const resp = await fetch('results.json');
            if (!resp.ok) throw new Error('No data');
            const data = await resp.json();

            if (data.length === 0) return;

            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('total-count').textContent = data.length;

            const container = document.getElementById('evaluations');
            container.innerHTML = data.map(renderEvaluation).join('');
        } catch (e) {
            // No data yet -- show empty state
        }
    }

    // Load agent.json for wallet info
    async function loadAgent() {
        try {
            const resp = await fetch('../agent.json');
            if (!resp.ok) return;
            const agent = await resp.json();
            document.getElementById('operator-wallet').textContent = agent.operator?.wallet || 'Not set';
            document.getElementById('evaluator-wallet').textContent = agent.evaluator?.wallet || 'Not set';
            if (agent.operator?.erc8004_agent_id) {
                document.getElementById('agent-id').textContent = `Agent #${agent.operator.erc8004_agent_id}`;
            }
        } catch (e) {}
    }

    loadData();
    loadAgent();
    // Auto-refresh every 10 seconds
    setInterval(loadData, 10000);
    </script>
</body>
</html>
