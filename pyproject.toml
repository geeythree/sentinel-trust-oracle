[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = ["network: tests requiring network access"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.coverage.run]
source = ["."]
omit = ["tests/*", "env/*", "dashboard/*", "setup_and_run.sh"]

[tool.coverage.report]
fail_under = 30
show_missing = true
